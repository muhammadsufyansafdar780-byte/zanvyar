<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
  <meta name="theme-color" content="#ffffff"/>
  <title>Track Order | ZENYAR</title>
  <link rel="icon" type="image/jpeg" href="ZENYAR-logo.jpg"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&family=Montserrat:wght@200;300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Montserrat',sans-serif;background:#fff;color:#111;-webkit-tap-highlight-color:transparent;min-height:100vh}
    a{text-decoration:none}
    button{-webkit-appearance:none;appearance:none;cursor:pointer}
    input{font-size:16px!important;-webkit-appearance:none}

    .pg-header{display:flex;align-items:center;justify-content:space-between;padding:1rem 2rem;border-bottom:1px solid #ebebeb;position:sticky;top:0;background:#fff;z-index:100}
    .pg-back{background:none;border:none;color:#aaa;font-family:'Montserrat',sans-serif;font-size:.62rem;font-weight:300;letter-spacing:.25em;text-transform:uppercase;display:flex;align-items:center;gap:.5rem;transition:color .2s}
    .pg-back:hover{color:#111}
    .pg-logo{font-family:'Playfair Display',serif;font-size:1.1rem;font-weight:400;letter-spacing:.4em;color:#111}
    .pg-logo a{color:#111}

    .pg-body{max-width:700px;margin:0 auto;padding:3rem 2rem 5rem}
    .pg-title{font-family:'Playfair Display',serif;font-size:1.8rem;font-weight:400;color:#111;margin-bottom:.5rem}
    .pg-sub{font-size:.68rem;font-weight:300;letter-spacing:.15em;color:#aaa;margin-bottom:3rem}

    /* Search */
    .track-search{margin-bottom:3rem}
    .track-search label{display:block;font-size:.6rem;font-weight:400;letter-spacing:.3em;text-transform:uppercase;color:#aaa;margin-bottom:.8rem}
    .track-row{display:flex;gap:.8rem}
    .track-row input{flex:1;padding:.9rem 1rem;border:1px solid #e0e0e0;font-family:'Montserrat',sans-serif;font-size:.85rem;font-weight:300;outline:none;transition:border .2s}
    .track-row input:focus{border-color:#111}
    .track-row button{padding:.9rem 1.8rem;background:#111;color:#fff;border:none;font-family:'Montserrat',sans-serif;font-size:.62rem;font-weight:400;letter-spacing:.25em;text-transform:uppercase;transition:background .3s}
    .track-row button:hover{background:#C6A969}

    /* Result */
    #track-result{display:none}
    .track-card{border:1px solid #e0e0e0;padding:2rem}
    .track-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:2rem;flex-wrap:wrap;gap:1rem}
    .track-order-id{font-family:'Playfair Display',serif;font-size:1.4rem;color:#111;letter-spacing:.05em}
    .track-date{font-size:.62rem;font-weight:300;color:#aaa;margin-top:.3rem;letter-spacing:.08em}
    .track-status-badge{font-size:.62rem;font-weight:400;letter-spacing:.2em;text-transform:uppercase;padding:.4rem 1rem;border:1px solid}
    .status-placed{color:#1565c0;border-color:#1565c0;background:#f0f4ff}
    .status-confirmed{color:#6a1b9a;border-color:#6a1b9a;background:#f9f0ff}
    .status-processing{color:#e65100;border-color:#e65100;background:#fff8f0}
    .status-shipped{color:#00695c;border-color:#00695c;background:#f0faf8}
    .status-delivered{color:#2e7d32;border-color:#2e7d32;background:#f0faf0}
    .status-cancelled{color:#c62828;border-color:#c62828;background:#fff0f0}

    /* Timeline */
    .track-timeline{margin-bottom:2rem}
    .timeline-title{font-size:.6rem;font-weight:400;letter-spacing:.3em;text-transform:uppercase;color:#aaa;margin-bottom:1.2rem}
    .timeline{position:relative;padding-left:2rem}
    .timeline::before{content:'';position:absolute;left:7px;top:0;bottom:0;width:1px;background:#e0e0e0}
    .timeline-item{position:relative;margin-bottom:1.5rem}
    .timeline-item:last-child{margin-bottom:0}
    .timeline-dot{position:absolute;left:-2rem;top:2px;width:14px;height:14px;border-radius:50%;border:2px solid #e0e0e0;background:#fff;transition:all .3s}
    .timeline-item.done .timeline-dot{border-color:#C6A969;background:#C6A969}
    .timeline-item.current .timeline-dot{border-color:#111;background:#111}
    .timeline-status{font-size:.72rem;font-weight:400;color:#aaa;letter-spacing:.05em}
    .timeline-item.done .timeline-status,.timeline-item.current .timeline-status{color:#111}
    .timeline-msg{font-size:.65rem;font-weight:300;color:#aaa;margin-top:.2rem;letter-spacing:.03em}
    .timeline-time{font-size:.58rem;font-weight:300;color:#bbb;margin-top:.2rem;letter-spacing:.05em}

    /* Delivery info */
    .track-info-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:2rem}
    .track-info-block{background:#fafafa;border:1px solid #f0f0f0;padding:1rem}
    .track-info-label{font-size:.58rem;font-weight:400;letter-spacing:.25em;text-transform:uppercase;color:#aaa;margin-bottom:.5rem}
    .track-info-val{font-size:.78rem;font-weight:300;color:#333;line-height:1.6}

    /* Actions */
    .track-actions{display:flex;gap:.8rem;flex-wrap:wrap}
    .track-btn{padding:.75rem 1.5rem;font-family:'Montserrat',sans-serif;font-size:.6rem;font-weight:400;letter-spacing:.2em;text-transform:uppercase;border:1px solid #e0e0e0;background:#fff;color:#555;transition:all .2s;cursor:pointer}
    .track-btn:hover{border-color:#111;color:#111}
    .track-btn.primary{background:#111;color:#fff;border-color:#111}
    .track-btn.primary:hover{background:#C6A969;border-color:#C6A969}

    /* Error */
    .track-error{background:#fff8f0;border:1px solid #ffe0c0;padding:1.5rem;text-align:center;display:none}
    .track-error i{font-size:1.5rem;color:#e65100;display:block;margin-bottom:.8rem}
    .track-error p{font-size:.75rem;font-weight:300;color:#555;line-height:1.8}

    .loading{text-align:center;padding:3rem;color:#aaa;font-size:.72rem;font-weight:300;letter-spacing:.2em;text-transform:uppercase;display:none}
    .loading i{display:block;font-size:1.5rem;margin-bottom:1rem;animation:spin 1s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}

    @media(max-width:600px){.pg-body{padding:2rem 1.2rem 4rem}.track-row{flex-direction:column}.track-info-grid{grid-template-columns:1fr}}
  </style>
</head>
<body>

<header class="pg-header">
  <button class="pg-back" onclick="history.back()"><i class="fas fa-arrow-left"></i> Back</button>
  <span class="pg-logo"><a href="index.html">ZENYAR</a></span>
  <div style="width:60px"></div>
</header>

<div class="pg-body">
  <h1 class="pg-title">Track Order</h1>
  <p class="pg-sub">Enter your Order ID to see real-time status</p>

  <div class="track-search">
    <label>Order ID</label>
    <div class="track-row">
      <input type="text" id="track-input" placeholder="e.g. ZY-123456"/>
      <button onclick="trackOrder()">Track</button>
    </div>
  </div>

  <div class="loading" id="track-loading"><i class="fas fa-circle-notch"></i>Fetching order...</div>
  <div class="track-error" id="track-error">
    <i class="fas fa-exclamation-circle"></i>
    <p id="track-error-msg">Order not found. Please check your Order ID and try again.</p>
  </div>

  <div id="track-result">
    <div class="track-card">
      <div class="track-header">
        <div>
          <div class="track-order-id" id="tr-id">—</div>
          <div class="track-date" id="tr-date">—</div>
        </div>
        <span class="track-status-badge" id="tr-status-badge">—</span>
      </div>

      <div class="track-timeline">
        <p class="timeline-title">Order Progress</p>
        <div class="timeline" id="tr-timeline"></div>
      </div>

      <div class="track-info-grid">
        <div class="track-info-block">
          <p class="track-info-label">Delivery To</p>
          <p class="track-info-val" id="tr-address">—</p>
        </div>
        <div class="track-info-block">
          <p class="track-info-label">Payment</p>
          <p class="track-info-val" id="tr-payment">—</p>
        </div>
        <div class="track-info-block">
          <p class="track-info-label">Courier</p>
          <p class="track-info-val" id="tr-courier">—</p>
        </div>        <div class="track-info-block">
          <p class="track-info-label">Order Total</p>
          <p class="track-info-val" id="tr-total">—</p>
        </div>
      </div>

      <div class="track-actions">
        <button class="track-btn primary" onclick="window.open('https://wa.me/923091452442?text=Hi ZENYAR, I need help with order: ' + currentOrderId,'_blank')">
          <i class="fab fa-whatsapp"></i> Contact Support
        </button>
        <button class="track-btn" onclick="window.location.href='orders.html'">
          <i class="fas fa-list"></i> All Orders
        </button>
      </div>
    </div>
  </div>
</div>

<script>
  const API = 'http://localhost:5000/api';
  let currentOrderId = '';

  const statusLabels = {
    placed:'Order Placed', confirmed:'Order Confirmed', processing:'Being Packed',
    shipped:'Order Shipped', delivered:'Order Delivered', cancelled:'Order Cancelled'
  };
  const allSteps = ['placed','confirmed','processing','shipped','delivered'];

  // Auto-track if ID in URL
  const urlId = new URLSearchParams(window.location.search).get('id');
  if (urlId) {
    document.getElementById('track-input').value = urlId;
    trackOrder();
  }

  document.getElementById('track-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') trackOrder();
  });

  async function trackOrder() {
    const id = document.getElementById('track-input').value.trim();
    if (!id) return;
    currentOrderId = id;

    document.getElementById('track-result').style.display = 'none';
    document.getElementById('track-error').style.display = 'none';
    document.getElementById('track-loading').style.display = 'block';

    try {
      const res = await fetch(`${API}/orders/track/${id}`, { signal: AbortSignal.timeout(5000) });
      document.getElementById('track-loading').style.display = 'none';

      if (res.ok) { renderOrder(await res.json()); return; }
      // Check local storage
      const local = localStorage.getItem('zy_order_' + id);
      if (local) { renderOrder(JSON.parse(local)); return; }
      showError('Order not found. Please check your Order ID.');
    } catch(e) {
      document.getElementById('track-loading').style.display = 'none';
      // Check local storage when backend offline
      const local = localStorage.getItem('zy_order_' + id);
      if (local) { renderOrder(JSON.parse(local)); return; }
      renderOffline(id);
    }
  }

  function renderOrder(o) {
    document.getElementById('tr-id').textContent = o.orderId;
    document.getElementById('tr-date').textContent = new Date(o.createdAt).toLocaleDateString('en-PK',{day:'numeric',month:'long',year:'numeric'});
    document.getElementById('tr-address').textContent = `${o.address?.name || '—'}, ${o.address?.city || ''}`;
    document.getElementById('tr-payment').textContent = (o.payment?.method || '—').toUpperCase();
    document.getElementById('tr-courier').textContent = o.courier?.name
      ? `${o.courier.name}${o.courier.trackingId ? ' — ' + o.courier.trackingId : ''}`
      : 'Not assigned yet';
    document.getElementById('tr-total').textContent = `Rs. ${(o.total || 0).toLocaleString()}`;

    const badge = document.getElementById('tr-status-badge');
    badge.textContent = statusLabels[o.status] || o.status;
    badge.className = `track-status-badge status-${o.status}`;

    // Timeline
    const stepIdx = allSteps.indexOf(o.status);
    const isCancelled = o.status === 'cancelled';
    const history = o.trackingHistory || [];

    const timelineEl = document.getElementById('tr-timeline');
    const steps = isCancelled ? [...allSteps, 'cancelled'] : allSteps;

    timelineEl.innerHTML = steps.map((step, i) => {
      const histEntry = history.find(h => h.status === step);
      const isDone = isCancelled ? step === 'cancelled' : i <= stepIdx;
      const isCurrent = isCancelled ? step === 'cancelled' : i === stepIdx;
      return `
        <div class="timeline-item ${isDone ? 'done' : ''} ${isCurrent ? 'current' : ''}">
          <div class="timeline-dot"></div>
          <div class="timeline-status">${statusLabels[step] || step}</div>
          ${histEntry ? `<div class="timeline-msg">${histEntry.message}</div>` : ''}
          ${histEntry ? `<div class="timeline-time">${new Date(histEntry.timestamp).toLocaleString('en-PK',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'})}</div>` : ''}
        </div>`;
    }).join('');

    document.getElementById('track-result').style.display = 'block';
  }

  function renderOffline(id) {
    document.getElementById('tr-id').textContent = id;
    document.getElementById('tr-date').textContent = 'Recently placed';
    document.getElementById('tr-address').textContent = '—';
    document.getElementById('tr-payment').textContent = '—';
    document.getElementById('tr-courier').textContent = 'Not assigned yet';
    document.getElementById('tr-total').textContent = '—';
    const badge = document.getElementById('tr-status-badge');
    badge.textContent = 'Order Placed';
    badge.className = 'track-status-badge status-placed';
    document.getElementById('tr-timeline').innerHTML = `
      <div class="timeline-item done current">
        <div class="timeline-dot"></div>
        <div class="timeline-status">Order Placed</div>
        <div class="timeline-msg">Your order has been received</div>
      </div>`;
    document.getElementById('track-result').style.display = 'block';
  }

  function showError(msg) {
    document.getElementById('track-error-msg').textContent = msg;
    document.getElementById('track-error').style.display = 'block';
  }
</script>
</body>
</html>
