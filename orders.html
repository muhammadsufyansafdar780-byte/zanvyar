<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover"/>
  <meta name="theme-color" content="#111111"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <title>My Orders | zenvyar</title>
  <link rel="icon" type="image/jpeg" href="zenvyar-logo.jpg"/>
  <link rel="apple-touch-icon" href="zenvyar-logo.jpg"/>
  <link rel="manifest" href="manifest.json"/>
  <link rel="stylesheet" href="style.css"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
  <style>
    body { background:#f5f5f5; font-family:'Poppins',sans-serif; padding-bottom:3rem; -webkit-font-smoothing:antialiased; }
    .orders-header { background:#111; color:#fff; padding:1rem 1.5rem; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:100; }
    .orders-header .logo { font-size:1.3rem; font-weight:800; color:#fff; text-decoration:none; }
    .orders-header .logo span { color:#FF4500; }
    .orders-header a.back { color:#aaa; text-decoration:none; font-size:0.9rem; display:flex; align-items:center; gap:6px; min-height:44px; }

    .orders-container { max-width:700px; margin:2rem auto; padding:0 1rem; }

    .search-track-box { background:#fff; border-radius:14px; padding:1.5rem; box-shadow:0 4px 20px rgba(0,0,0,0.07); margin-bottom:1.5rem; }
    .search-track-box h2 { font-size:1.1rem; margin-bottom:0.3rem; }
    .search-track-box p { color:#888; font-size:0.85rem; margin-bottom:1rem; }
    .track-row { display:flex; gap:0.6rem; flex-wrap:wrap; }
    .track-row input { flex:1; min-width:0; padding:0.8rem 1rem; border:2px solid #eee; border-radius:10px; font-family:'Poppins',sans-serif; font-size:16px; outline:none; transition:border 0.2s; -webkit-appearance:none; }
    .track-row input:focus { border-color:#FF4500; }
    .track-row button { padding:0.8rem 1.2rem; background:#FF4500; color:#fff; border:none; border-radius:10px; font-family:'Poppins',sans-serif; font-weight:600; cursor:pointer; font-size:0.9rem; min-height:48px; touch-action:manipulation; -webkit-appearance:none; }

    @media (max-width:480px) {
      .track-row { flex-direction:column; }
      .track-row button { width:100%; }
    }

    .section-title { font-size:1rem; font-weight:700; color:#333; margin:1.5rem 0 0.8rem; display:flex; align-items:center; gap:0.5rem; }
    .section-title i { color:#FF4500; }

    .order-card { background:#fff; border-radius:14px; overflow:hidden; box-shadow:0 2px 12px rgba(0,0,0,0.07); margin-bottom:1rem; border:1px solid #f0f0f0; transition:box-shadow 0.2s; }
    .order-card:hover { box-shadow:0 6px 24px rgba(0,0,0,0.1); }
    .order-card-top { padding:1rem 1.2rem; display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid #f5f5f5; flex-wrap:wrap; gap:0.5rem; }
    .order-id-label { font-size:0.78rem; color:#999; }
    .order-id-val { font-size:0.95rem; font-weight:700; color:#222; }
    .order-date { font-size:0.78rem; color:#aaa; }
    .status-pill { padding:4px 12px; border-radius:20px; font-size:0.75rem; font-weight:700; }
    .status-placed    { background:#e3f2fd; color:#1565c0; }
    .status-confirmed { background:#fff3e0; color:#e65100; }
    .status-processing{ background:#f3e5f5; color:#7b1fa2; }
    .status-shipped   { background:#fff8e1; color:#f57f17; }
    .status-delivered { background:#e8f5e9; color:#27ae60; }
    .status-cancelled { background:#ffebee; color:#c62828; }

    .order-card-items { padding:0.8rem 1.2rem; display:flex; gap:0.5rem; flex-wrap:wrap; border-bottom:1px solid #f5f5f5; }
    .order-item-chip { background:#f8f8f8; border-radius:6px; padding:0.3rem 0.7rem; font-size:0.78rem; color:#555; }

    .order-card-footer { padding:0.8rem 1.2rem; display:flex; justify-content:space-between; align-items:center; }
    .order-total-label { font-size:0.82rem; color:#888; }
    .order-total-val { font-size:1rem; font-weight:800; color:#FF4500; }
    .order-actions { display:flex; gap:0.5rem; }
    .btn-track { background:#FF4500; color:#fff; border:none; padding:0.45rem 1rem; border-radius:8px; font-size:0.8rem; font-weight:600; cursor:pointer; font-family:'Poppins',sans-serif; display:flex; align-items:center; gap:5px; text-decoration:none; }
    .btn-reorder { background:#fff; color:#FF4500; border:1.5px solid #FF4500; padding:0.45rem 1rem; border-radius:8px; font-size:0.8rem; font-weight:600; cursor:pointer; font-family:'Poppins',sans-serif; }

    .empty-state { text-align:center; padding:3rem 1rem; color:#bbb; }
    .empty-state i { font-size:3.5rem; color:#eee; display:block; margin-bottom:1rem; }
    .empty-state a { display:inline-block; margin-top:1rem; background:#FF4500; color:#fff; padding:0.7rem 1.5rem; border-radius:8px; text-decoration:none; font-weight:600; font-size:0.9rem; }

    .loading { text-align:center; padding:2rem; color:#aaa; }
    .loading i { font-size:2rem; color:#FF4500; animation:spin 1s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }
  </style>
</head>
<body>

  <header class="orders-header">
    <a href="index.html" class="logo"><img src="zenvyar-logo.jpg" alt="Zenvyar" style="height:44px;vertical-align:middle;border-radius:6px;object-fit:contain"/><span style="font-size:1rem;font-weight:700;vertical-align:middle;margin-left:6px">Zenvyar</span></a>
    <a href="index.html" class="back"><i class="fas fa-arrow-left"></i> Back to Shop</a>
  </header>

  <div class="orders-container">

    <!-- Track by ID -->
    <div class="search-track-box">
      <h2><i class="fas fa-search" style="color:#FF4500"></i> Track an Order</h2>
      <p>Enter your Order / Tracking ID to see its status</p>
      <div class="track-row">
        <input type="text" id="track-input" placeholder="e.g. TV-123456" oninput="this.value=this.value.toUpperCase()"/>
        <button onclick="goTrack()"><i class="fas fa-map-marker-alt"></i> Track</button>
      </div>
    </div>

    <!-- Recent Orders from localStorage -->
    <div class="section-title"><i class="fas fa-history"></i> Recent Orders</div>
    <div id="loading" class="loading"><i class="fas fa-circle-notch"></i></div>
    <div id="orders-list"></div>

  </div>

  <script>
    const API = 'http://localhost:5000/api';

    function goTrack() {
      const id = document.getElementById('track-input').value.trim();
      if (!id) return;
      window.location.href = `track.html?id=${id}`;
    }
    document.getElementById('track-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') goTrack();
    });

    const statusColors = { placed:'placed', confirmed:'confirmed', processing:'processing', shipped:'shipped', delivered:'delivered', cancelled:'cancelled' };

    async function loadOrders() {
      const list = document.getElementById('orders-list');
      document.getElementById('loading').style.display = 'block';

      // Try backend (logged-in user)
      const token = localStorage.getItem('tv_token');
      if (token) {
        try {
          const res = await fetch(`${API}/orders/my`, { headers: { 'Authorization': `Bearer ${token}` } });
          if (res.ok) {
            const orders = await res.json();
            document.getElementById('loading').style.display = 'none';
            renderOrders(orders);
            return;
          }
        } catch(e) {}
      }

      // Fallback: localStorage saved order IDs
      const savedIds = JSON.parse(localStorage.getItem('tv_order_ids') || '[]');
      document.getElementById('loading').style.display = 'none';

      if (savedIds.length === 0) {
        list.innerHTML = `<div class="empty-state"><i class="fas fa-shopping-bag"></i><p>No orders yet</p><a href="index.html">Start Shopping</a></div>`;
        return;
      }

      // Fetch each order from backend
      const orders = [];
      for (const id of savedIds.slice(0, 10)) {
        try {
          const res = await fetch(`${API}/orders/track/${id}`);
          if (res.ok) orders.push(await res.json());
        } catch(e) {}
      }

      if (orders.length === 0) {
        list.innerHTML = `<div class="empty-state"><i class="fas fa-shopping-bag"></i><p>Could not load orders. Check your connection.</p><a href="index.html">Start Shopping</a></div>`;
        return;
      }
      renderOrders(orders);
    }

    function renderOrders(orders) {
      const list = document.getElementById('orders-list');
      if (!orders.length) {
        list.innerHTML = `<div class="empty-state"><i class="fas fa-shopping-bag"></i><p>No orders yet</p><a href="index.html">Start Shopping</a></div>`;
        return;
      }
      list.innerHTML = orders.map(o => `
        <div class="order-card">
          <div class="order-card-top">
            <div>
              <div class="order-id-label">Order ID</div>
              <div class="order-id-val">${o.orderId}</div>
              <div class="order-date">${new Date(o.createdAt).toLocaleDateString('en-PK', { day:'numeric', month:'short', year:'numeric' })}</div>
            </div>
            <span class="status-pill status-${o.status}">${o.status.charAt(0).toUpperCase() + o.status.slice(1)}</span>
          </div>
          <div class="order-card-items">
            ${(o.items || []).map(i => `<span class="order-item-chip">${i.name} ${i.size ? `(${i.size})` : ''} ×${i.qty}</span>`).join('')}
          </div>
          <div class="order-card-footer">
            <div>
              <div class="order-total-label">Total Amount</div>
              <div class="order-total-val">Rs. ${(o.total || 0).toLocaleString()}</div>
            </div>
            <div class="order-actions">
              <a href="track.html?id=${o.orderId}" class="btn-track"><i class="fas fa-map-marker-alt"></i> Track</a>
            </div>
          </div>
        </div>
      `).join('');
    }

    loadOrders();
  </script>
</body>
</html>
