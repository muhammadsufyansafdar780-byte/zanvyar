<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <!-- Outer circle background -->
  <circle cx="60" cy="60" r="60" fill="#FF4500"/>

  <!-- Inner white circle ring -->
  <circle cx="60" cy="60" r="52" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="2"/>

  <!-- Shopping bag body -->
  <rect x="30" y="50" width="60" height="44" rx="6" ry="6" fill="white"/>

  <!-- Bag handle -->
  <path d="M44 50 Q44 32 60 32 Q76 32 76 50" fill="none" stroke="white" stroke-width="5" stroke-linecap="round"/>

  <!-- TV letters inside bag -->
  <text x="60" y="82" font-family="Poppins, Arial Black, sans-serif" font-size="22" font-weight="900" fill="#FF4500" text-anchor="middle" letter-spacing="1">TV</text>
</svg>
